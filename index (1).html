<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>세차LOG</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{font-size:16px;}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:#f0f2f7;
  color:#1a1d2e;
  min-height:100dvh;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
:root{
  --bg:#f0f2f7;
  --white:#ffffff;
  --border:#e2e6f0;
  --border2:#cdd3e4;
  --blue:#2563eb;
  --blue-l:rgba(37,99,235,0.09);
  --green:#16a34a;
  --green-l:rgba(22,163,74,0.10);
  --muted:#64748b;
  --dim:#b0bac8;
  --text:#1a1d2e;
  --r:14px;
  --rs:10px;
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
}

/* ── PAGE SYSTEM ── */
.page{display:none;min-height:100dvh;flex-direction:column;}
.page.on{display:flex;}
.safe-t{height:var(--safe-t);background:var(--white);flex-shrink:0;}

/* ── TOP BAR ── */
.topbar{
  background:var(--white);border-bottom:1px solid var(--border);
  height:54px;padding:0 16px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;flex-shrink:0;
  box-shadow:0 1px 6px rgba(0,0,0,0.05);
}
.tb-logo{font-size:18px;font-weight:900;letter-spacing:-0.5px;}
.tb-logo em{color:var(--blue);font-style:normal;}
.tb-date{
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;
  color:var(--muted);background:var(--bg);border:1px solid var(--border);
  padding:3px 10px;border-radius:20px;
}
.tb-back{
  display:flex;align-items:center;gap:5px;
  font-size:14px;font-weight:700;color:var(--blue);cursor:pointer;padding:6px 0;
}
.tb-center{font-size:15px;font-weight:800;color:var(--text);}
.tb-spacer{width:52px;}

/* ── SCROLL BODY ── */
.scroll{flex:1;overflow-y:auto;scrollbar-width:none;}
.scroll::-webkit-scrollbar{display:none;}

/* ════════════════════════
   HOME PAGE
════════════════════════ */
.home-body{padding:16px 14px calc(var(--safe-b)+76px);}

/* 요일 탭 */
.day-tabs{
  display:flex;gap:6px;margin-bottom:18px;
  overflow-x:auto;scrollbar-width:none;padding-bottom:2px;
}
.day-tabs::-webkit-scrollbar{display:none;}
.dt{
  flex:1;min-width:0;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:10px 4px;border-radius:var(--rs);
  border:1.5px solid var(--border);background:var(--white);
  cursor:pointer;transition:all .16s;
}
.dt .dn{font-size:12px;font-weight:700;color:var(--muted);}
.dt .dc{
  font-family:'JetBrains Mono',monospace;
  font-size:16px;font-weight:700;color:var(--text);line-height:1;
}
.dt .dl{font-size:9px;font-weight:600;color:var(--dim);}
.dt.on{border-color:var(--blue);background:var(--blue);}
.dt.on .dn{color:rgba(255,255,255,0.8);}
.dt.on .dc{color:#fff;}
.dt.on .dl{color:rgba(255,255,255,0.6);}

/* 요약 바 */
.summary-bar{
  background:var(--white);border:1px solid var(--border);border-radius:var(--r);
  padding:14px 16px;margin-bottom:18px;
  box-shadow:0 1px 4px rgba(0,0,0,0.05);
}
.sb-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.sb-title{font-size:13px;font-weight:700;color:var(--text);}
.carryover-badge{
  display:inline-flex;align-items:center;gap:4px;
  font-size:10px;font-weight:700;
  background:rgba(234,88,12,0.10);color:#ea580c;
  border:1px solid rgba(234,88,12,0.25);
  padding:3px 8px;border-radius:20px;
}
.sb-nums{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px;}
.sb-num{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  background:var(--bg);border:1px solid var(--border);border-radius:var(--rs);
  padding:10px 4px;
}
.sb-num .nv{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;line-height:1;}
.sb-num .nl{font-size:10px;font-weight:600;color:var(--muted);}
.sb-num.n-total .nv{color:var(--blue);}
.sb-num.n-done  .nv{color:var(--green);}
.sb-num.n-left  .nv{color:#d97706;}
.prog-wrap{display:flex;align-items:center;gap:10px;}
.prog-bg{flex:1;height:8px;background:var(--bg);border:1px solid var(--border);border-radius:4px;overflow:hidden;}
.prog-fg{height:100%;background:linear-gradient(90deg,var(--blue),var(--green));border-radius:4px;transition:width .4s cubic-bezier(.4,0,.2,1);}
.prog-pct{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--green);flex-shrink:0;min-width:36px;text-align:right;}

/* 섹션 타이틀 */
.sec-title{
  font-size:11px;font-weight:800;color:var(--muted);
  letter-spacing:.5px;text-transform:uppercase;
  margin-bottom:10px;padding-left:2px;
}

/* 아파트 버튼 그리드 */
.apt-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.apt-btn{
  background:var(--white);border:1.5px solid var(--border);border-radius:var(--r);
  padding:14px 12px 12px;cursor:pointer;
  display:flex;flex-direction:column;gap:6px;
  box-shadow:0 1px 4px rgba(0,0,0,0.05);
  transition:all .15s;position:relative;overflow:hidden;
  text-align:left;-webkit-user-select:none;user-select:none;
}
.apt-btn:active{transform:scale(.96);box-shadow:none;}
.apt-btn.has-schedule{border-color:rgba(37,99,235,.25);}
.ab-icon{font-size:20px;line-height:1;}
.ab-name{font-size:12px;font-weight:800;color:var(--text);line-height:1.3;}
.ab-info{font-size:10px;color:var(--muted);font-weight:600;}
/* 미니 진행바 */
.ab-prog{height:3px;background:var(--bg);border:1px solid var(--border);border-radius:2px;overflow:hidden;margin-top:2px;}
.ab-prog-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s;}
/* 배지 */
.ab-badge{
  position:absolute;top:10px;right:10px;
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;
  padding:2px 6px;border-radius:6px;
}
.ab-badge.b-some{background:rgba(22,163,74,.10);color:var(--green);border:1px solid rgba(22,163,74,.2);}
.ab-badge.b-none{background:var(--bg);color:var(--dim);border:1px solid var(--border);}
.ab-badge.b-all{background:rgba(37,99,235,.10);color:var(--blue);border:1px solid rgba(37,99,235,.2);}
/* 해당 요일 예정 없으면 흐리게 */
.apt-btn.no-schedule{opacity:.45;}
.ab-arrow{position:absolute;bottom:10px;right:12px;color:var(--dim);font-size:14px;}

/* ════════════════════════
   DETAIL PAGE
════════════════════════ */

/* 아파트 히어로 */
.apt-hero{
  background:var(--white);border-bottom:1px solid var(--border);
  padding:14px 16px 12px;flex-shrink:0;
}
.ah-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.ah-icon{font-size:24px;}
.ah-name{font-size:16px;font-weight:900;color:var(--text);}
.ah-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.ah-stat-row{
  display:flex;background:var(--bg);border:1px solid var(--border);
  border-radius:var(--rs);overflow:hidden;
}
.ahs{flex:1;padding:9px 0;text-align:center;border-right:1px solid var(--border);}
.ahs:last-child{border-right:none;}
.ahs .av{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:700;line-height:1;}
.ahs .al{font-size:10px;color:var(--muted);margin-top:3px;font-weight:600;}
.ahs.at .av{color:var(--blue);}
.ahs.ad .av{color:var(--green);}
.ahs.ar .av{color:#d97706;}

/* 차량 카드 리스트 */
.car-list{padding:12px 12px calc(var(--safe-b)+76px);}

.empty-msg{
  text-align:center;padding:48px 24px;
  color:var(--muted);font-size:14px;font-weight:600;
}
.empty-msg .ei{font-size:36px;margin-bottom:10px;}

.car-card{
  background:var(--white);border:1px solid var(--border);
  border-radius:var(--r);margin-bottom:10px;overflow:hidden;
  box-shadow:0 1px 4px rgba(0,0,0,0.05);
  transition:all .15s;
}
.car-card.done-card{
  border-color:rgba(22,163,74,.3);
  background:rgba(22,163,74,.02);
}
/* 이월 차량 카드 */
.car-card.carryover-card{
  border-color:rgba(234,88,12,.35);
  background:rgba(234,88,12,.02);
}
.carryover-tag{
  display:inline-flex;align-items:center;gap:3px;
  font-size:10px;font-weight:700;
  background:rgba(234,88,12,.10);color:#ea580c;
  border:1px solid rgba(234,88,12,.25);
  padding:2px 7px;border-radius:5px;flex-shrink:0;
}
.car-card:last-child{margin-bottom:0;}

/* 카드 상단 */
.cc-top{
  display:flex;align-items:center;gap:10px;
  padding:12px 14px 10px;border-bottom:1px solid var(--border);
}
.cc-num{
  font-family:'JetBrains Mono',monospace;
  font-size:16px;font-weight:700;color:var(--blue);
  letter-spacing:1px;flex-shrink:0;min-width:50px;
}
.cc-info{flex:1;min-width:0;}
.cc-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cc-loc{font-size:11px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.color-chip{
  font-size:10px;font-weight:700;padding:2px 8px;
  border-radius:5px;flex-shrink:0;white-space:nowrap;
}
.cc-검정{background:#1e1e1e;color:#bbb;border:1px solid #444;}
.cc-흰색{background:#f0f0f0;color:#444;border:1px solid #ccc;}
.cc-은색{background:#c8d0dc;color:#333;border:1px solid #aab;}
.cc-남색{background:#1e3a70;color:#9ec8f0;border:1px solid #2a4a8e;}
.cc-청색{background:#1860a8;color:#90d0f8;border:1px solid #2a6cc0;}
.cc-남희색{background:#243a5e;color:#90b8d8;border:1px solid #344;}
.cc-금색{background:#7a5a10;color:#f8e070;border:1px solid #9a7a20;}
.cc-빨강{background:#8a1818;color:#f8a0a0;border:1px solid #aa2828;}
.cc-회색{background:#888;color:#fff;border:1px solid #999;}
.cc-무광{background:#3a3a3a;color:#ccc;border:1px solid #555;}
.cc-default{background:var(--border);color:var(--muted);border:1px solid var(--border2);}

/* 노트 */
.cc-note{
  font-size:11px;color:var(--muted);padding:7px 14px;
  border-bottom:1px solid var(--border);line-height:1.5;
  background:#fafbff;
}

/* 체크 영역 — 심플하게 */
.cc-check-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 14px;
}
.cc-check-left{display:flex;flex-direction:column;gap:2px;}
.cc-check-status{font-size:12px;font-weight:700;}
.cc-check-status.s-wait{color:var(--muted);}
.cc-check-status.s-done{color:var(--green);}
.cc-check-status.s-carry{color:#ea580c;}
.cc-check-hint{font-size:10px;color:var(--dim);}

/* 큰 체크 버튼 */
.chk-btn{
  width:48px;height:48px;border-radius:50%;
  border:2.5px solid var(--border2);background:#f8f9fc;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s cubic-bezier(.34,1.56,.64,1);
  flex-shrink:0;
  -webkit-user-select:none;user-select:none;
}
.chk-btn:active{transform:scale(.85);}
.chk-btn svg{display:none;}
.chk-btn.done{
  border-color:var(--green);
  background:var(--green);
}
.chk-btn.done svg{display:block;}
.chk-btn.pop{animation:pop .28s ease;}
@keyframes pop{0%{transform:scale(.6)}65%{transform:scale(1.25)}100%{transform:scale(1)}}

/* ── BOTTOM NAV ── */
.bnav{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--white);border-top:1px solid var(--border);
  padding:8px 0 calc(var(--safe-b)+4px);
  display:flex;z-index:200;
  box-shadow:0 -2px 12px rgba(0,0,0,.06);
}
.bnav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:5px 0;cursor:pointer;
}
.bnav-btn:active{opacity:.55;}
.bnav-icon{font-size:20px;line-height:1;}
.bnav-lbl{font-size:10px;font-weight:700;color:var(--muted);}
.bnav-btn.on .bnav-lbl{color:var(--blue);}

/* ── LEGEND SHEET ── */
.sheet{position:fixed;inset:0;z-index:300;display:none;}
.sheet.on{display:flex;flex-direction:column;justify-content:flex-end;}
.sheet-bg{position:absolute;inset:0;background:rgba(0,0,0,.28);backdrop-filter:blur(3px);}
.sheet-panel{
  position:relative;background:var(--white);
  border-radius:20px 20px 0 0;padding:20px 20px calc(var(--safe-b)+20px);
  border-top:1px solid var(--border);
  box-shadow:0 -4px 20px rgba(0,0,0,.08);
  animation:sup .24s cubic-bezier(.4,0,.2,1);
}
@keyframes sup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px;}
.sheet-title{font-size:15px;font-weight:800;margin-bottom:14px;}
.legend-rows{display:flex;flex-direction:column;gap:8px;}
.leg-row{
  display:flex;align-items:center;gap:12px;
  background:var(--bg);border:1px solid var(--border);
  border-radius:var(--rs);padding:12px 14px;
}
.leg-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.leg-icon.ic-done{background:var(--green);border:2px solid var(--green);}
.leg-icon.ic-wait{background:#f8f9fc;border:2.5px solid var(--border2);}
.leg-text .lt-lbl{font-size:13px;font-weight:700;}
.leg-text .lt-desc{font-size:11px;color:var(--muted);margin-top:2px;}
.sheet-tip{
  margin-top:12px;font-size:12px;color:var(--muted);
  background:var(--bg);border:1px solid var(--border);
  border-radius:var(--rs);padding:10px 14px;line-height:1.7;
}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:calc(var(--safe-b)+72px);left:50%;
  transform:translateX(-50%) translateY(14px);
  background:#1e293b;border:1px solid #334155;
  padding:9px 20px;border-radius:24px;font-size:13px;font-weight:600;
  color:#fff;box-shadow:0 6px 24px rgba(0,0,0,.18);
  opacity:0;pointer-events:none;z-index:999;white-space:nowrap;
  transition:opacity .2s,transform .2s;
}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

/* ══════════════════════════════
   MANAGE PAGE
══════════════════════════════ */
.manage-body{padding:16px 14px calc(var(--safe-b)+80px);}
.mg-tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;}
.mg-tab{
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:12px 8px;border-radius:var(--rs);
  border:1.5px solid var(--border);background:var(--white);
  font-size:13px;font-weight:700;color:var(--muted);
  cursor:pointer;transition:all .16s;
  box-shadow:0 1px 4px rgba(0,0,0,.05);
}
.mg-tab.on{border-color:var(--blue);background:var(--blue);color:#fff;}
.mg-section-title{
  font-size:11px;font-weight:800;color:var(--muted);
  letter-spacing:.5px;text-transform:uppercase;
  margin-bottom:14px;padding-left:2px;
}
.mg-field{margin-bottom:16px;}
.mg-label{display:block;font-size:12px;font-weight:700;color:var(--text);margin-bottom:7px;}
.mg-req{color:var(--blue);}
.mg-input{
  width:100%;height:46px;padding:0 14px;
  background:var(--white);border:1.5px solid var(--border);
  border-radius:var(--rs);font-size:14px;color:var(--text);
  font-family:'Noto Sans KR',sans-serif;outline:none;
  transition:border-color .18s;box-shadow:0 1px 3px rgba(0,0,0,.04);
}
.mg-input:focus{border-color:var(--blue);}
.mg-input::placeholder{color:var(--dim);}
.mg-select-wrap{position:relative;}
.mg-select{
  width:100%;height:46px;padding:0 36px 0 14px;
  background:var(--white);border:1.5px solid var(--border);
  border-radius:var(--rs);font-size:14px;color:var(--text);
  font-family:'Noto Sans KR',sans-serif;outline:none;
  appearance:none;-webkit-appearance:none;
  transition:border-color .18s;box-shadow:0 1px 3px rgba(0,0,0,.04);
}
.mg-select:focus{border-color:var(--blue);}
.mg-select-arrow{position:absolute;right:12px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--muted);}
.mg-day-btns{display:flex;gap:8px;}
.mg-day{
  flex:1;height:44px;display:flex;align-items:center;justify-content:center;
  border-radius:var(--rs);border:1.5px solid var(--border);
  background:var(--white);font-size:14px;font-weight:700;
  color:var(--muted);cursor:pointer;transition:all .15s;
  box-shadow:0 1px 3px rgba(0,0,0,.04);
}
.mg-day.on{border-color:var(--blue);background:var(--blue);color:#fff;}
.mg-submit-btn{
  width:100%;height:52px;border-radius:var(--r);
  background:var(--blue);color:#fff;border:none;
  font-size:15px;font-weight:800;font-family:'Noto Sans KR',sans-serif;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  gap:8px;margin-top:8px;
  box-shadow:0 4px 16px rgba(37,99,235,.3);transition:all .15s;
}
.mg-submit-btn:active{transform:scale(.97);box-shadow:none;}
.mg-search-row{
  display:flex;align-items:center;gap:10px;
  background:var(--white);border:1.5px solid var(--border);
  border-radius:var(--rs);padding:0 14px;height:46px;
  margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04);
}
.mg-search-row:focus-within{border-color:var(--blue);}
.mg-search{
  flex:1;background:none;border:none;outline:none;
  font-size:14px;color:var(--text);font-family:'Noto Sans KR',sans-serif;
}
.mg-search::placeholder{color:var(--dim);}
.del-card{
  background:var(--white);border:1.5px solid var(--border);
  border-radius:var(--r);margin-bottom:10px;overflow:hidden;
  box-shadow:0 1px 4px rgba(0,0,0,.05);
}
.del-card-body{display:flex;align-items:center;gap:12px;padding:13px 14px;}
.del-apt-tag{
  font-size:10px;font-weight:700;color:var(--blue);
  background:rgba(37,99,235,.08);border:1px solid rgba(37,99,235,.2);
  padding:2px 7px;border-radius:5px;flex-shrink:0;white-space:nowrap;
}
.del-car-info{flex:1;min-width:0;}
.del-car-num{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--blue);}
.del-car-name{font-size:12px;font-weight:700;color:var(--text);margin-top:1px;}
.del-car-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.del-sched{
  display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;
}
.del-sched-day{
  font-size:10px;font-weight:700;
  background:rgba(37,99,235,.07);color:var(--blue);
  border:1px solid rgba(37,99,235,.15);
  padding:1px 6px;border-radius:4px;
}
.del-btn{
  width:38px;height:38px;border-radius:50%;
  background:rgba(220,38,38,.08);border:1.5px solid rgba(220,38,38,.25);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;transition:all .15s;
}
.del-btn:active{transform:scale(.88);background:rgba(220,38,38,.18);}
.del-empty{text-align:center;padding:40px 24px;color:var(--muted);font-size:13px;font-weight:600;}

            <div class="mg-day" data-day="tue">화</div>

let activeDay = 'sun';
let curApt    = null;

// 완료 상태: "w5_{aptId}_{ci}_{dayKey}" = '1'
const sk      = (a,ci,d) => `w5_${a}_${ci}_${d}`;
const isDone  = (a,ci,d) => localStorage.getItem(sk(a,ci,d)) === '1';
const setDone = (a,ci,d,v) => v ? localStorage.setItem(sk(a,ci,d),'1') : localStorage.removeItem(sk(a,ci,d));

// 요일 순서
const DAY_ORDER = ['sun','mon','tue','wed','thu'];

/*
  ── 이월 규칙 ──────────────────────────────────────────────
  차량이 특정 요일(origDay)에 sched 에 있고 완료(isDone)가 안 됐으면
  → 바로 다음 요일(nextDay)에 이월 차량으로 나타난다.
  nextDay에서도 완료 안 되면 → 그 다음 날로 계속 이월.
  
  즉, dayKey 에 보여야 할 이월 차량 =
    이전 요일들 중 sched 에 있었고 아직 완료 안 된 차량.
    (단, dayKey 자체의 sched 여부는 무관)

  isCarryoverOnDay(apt, ci, dayKey):
    dayKey 에 이 차량이 "이월 상태"로 표시돼야 하는가?
    
    조건:
    1. dayKey 에 아직 완료 안 됐을 것
    2. dayKey 이전 요일 중 sched 에 있었고 완료 안 된 날이 존재할 것
    3. 그 이전 요일과 dayKey 사이에 완료된 날이 없을 것
       (중간에 완료됐으면 이월 해소)

  쉽게 말하면:
  "가장 최근 sched 예정일부터 지금까지 한 번도 완료 안 됐으면" → 이월
──────────────────────────────────────────────────────── */
function isCarryoverOnDay(apt, ci, dayKey) {
  const car = apt.cars[ci];
  const todayIdx = DAY_ORDER.indexOf(dayKey);
  if (todayIdx <= 0) return false; // 첫날(일)은 이월 없음

  // dayKey 에 이미 완료됐으면 이월 표시 불필요
  if (isDone(apt.id, ci, dayKey)) return false;

  // 이전 요일 중 가장 최근 sched 날 찾기
  let lastSchedIdx = -1;
  for (let i = todayIdx - 1; i >= 0; i--) {
    if (car.sched.includes(DAY_ORDER[i])) { lastSchedIdx = i; break; }
  }
  if (lastSchedIdx === -1) return false; // 이전에 예정 자체가 없으면 이월 아님

  // lastSchedIdx 부터 dayKey 바로 전까지 완료된 날이 하나라도 있으면 이월 아님
  for (let i = lastSchedIdx; i < todayIdx; i++) {
    if (isDone(apt.id, ci, DAY_ORDER[i])) return false; // 중간 완료 → 이월 해소
  }

  // lastSchedIdx 의 sched 에 있었고 완료 안 됐으면 → 이월
  return true;
}

// dayKey 에 해당 차량을 "보여줘야 하는가" (원래 sched OR 이월)
function shouldShowOnDay(apt, ci, dayKey) {
  const car = apt.cars[ci];
  return car.sched.includes(dayKey) || isCarryoverOnDay(apt, ci, dayKey);
}

// 이월 원인 요일 텍스트 (예: "일요일")
function carryoverFromDay(apt, ci, dayKey) {
  const car = apt.cars[ci];
  const todayIdx = DAY_ORDER.indexOf(dayKey);
  for (let i = todayIdx - 1; i >= 0; i--) {
    if (car.sched.includes(DAY_ORDER[i]) && !isDone(apt.id, ci, DAY_ORDER[i])) {
      return DAYS.find(d => d.key === DAY_ORDER[i])?.name + '요일';
    }
  }
  return '';
}

function renderHome(){
  buildDayTabs();
  buildAptGrid();

function buildDayTabs(){
  const el=document.getElementById('day-tabs');
  el.innerHTML=DAYS.map(d=>{
    // 해당 요일에 보여야 할 차량 수 (원래 sched + 이월)
    let total=0;
    APTS.forEach(apt=>apt.cars.forEach((_,ci)=>{
      if(shouldShowOnDay(apt,ci,d.key)) total++;
    }));
    return `
    <div class="dt${d.key===activeDay?' on':''}" data-day="${d.key}">
      <span class="dn">${d.name}요일</span>
      <span class="dc">${total}</span>
      <span class="dl">대 예정</span>
    </div>`;
  }).join('');
  el.querySelectorAll('.dt').forEach(b=>b.addEventListener('click',()=>{
    activeDay=b.dataset.day;
    renderHome();
    if(curApt) renderDetail();
  }));
}

function calcHomeSummary(){
  let total=0, done=0, carryoverCount=0;
  APTS.forEach(apt=>apt.cars.forEach((_,ci)=>{
    if(!shouldShowOnDay(apt,ci,activeDay)) return;
    total++;
    if(isDone(apt.id,ci,activeDay)) done++;
    else if(isCarryoverOnDay(apt,ci,activeDay)) carryoverCount++;
  }));
  const left=total-done;
  const pct=total?Math.round(done/total*100):0;
  const dayName=DAYS.find(d=>d.key===activeDay)?.name;

  document.getElementById('sb-daytitle').textContent=`${dayName}요일 세차 현황`;
  document.getElementById('sb-total').textContent=total;
  document.getElementById('sb-done').textContent=done;
  document.getElementById('sb-left').textContent=left;
  document.getElementById('sb-pct').textContent=pct+'%';
  document.getElementById('sb-bar').style.width=pct+'%';

  const badge=document.getElementById('sb-carryover');
  if(carryoverCount>0){
    badge.style.display='inline-flex';
    badge.textContent=`↩ 이월 ${carryoverCount}대`;
  } else {
    badge.style.display='none';
  }
}

function buildAptGrid(){
  const el=document.getElementById('apt-grid');
  el.innerHTML=APTS.map(apt=>{
    // 해당 요일에 보여야 할 차량 (sched + 이월)
    const visible=apt.cars.map((_,ci)=>ci).filter(ci=>shouldShowOnDay(apt,ci,activeDay));
    const total=visible.length;
    const done=visible.filter(ci=>isDone(apt.id,ci,activeDay)).length;
    const carryovers=visible.filter(ci=>isCarryoverOnDay(apt,ci,activeDay)).length;
    const pct=total?Math.round(done/total*100):0;
    const hasSchedule=total>0;
    let badgeCls='b-none', badgeText='없음';
    if(total>0){
      if(done===total){ badgeCls='b-all'; badgeText=`${done}/${total} ✓`; }
      else { badgeCls='b-some'; badgeText=`${done}/${total}`; }
    }
    const carryoverHtml=carryovers>0
      ?`<div style="font-size:10px;font-weight:700;color:#ea580c;margin-top:2px;">↩ 이월 ${carryovers}대</div>`:'';
    return `
    <div class="apt-btn${hasSchedule?' has-schedule':' no-schedule'}" onclick="${hasSchedule?`goDetail('${apt.id}')`:''}" style="${!hasSchedule?'cursor:default':''}">
      <div class="ab-icon">${apt.icon}</div>
      <div class="ab-name">${apt.name}</div>
      <div class="ab-info">${hasSchedule?`${total}대 예정`:'이날 없음'}</div>
      ${carryoverHtml}
      ${hasSchedule?`<div class="ab-prog"><div class="ab-prog-fill" style="width:${pct}%"></div></div>`:''}
      <div class="ab-badge ${badgeCls}">${badgeText}</div>
      ${hasSchedule?`<div class="ab-arrow">›</div>`:''}
    </div>`;
  }).join('');
}

    </div>
    <div class="ah-stat-row">
      <div class="ahs at"><div class="av">${total}</div><div class="al">예정</div></div>
      <div class="ahs ad"><div class="av">${done}</div><div class="al">완료</div></div>
      <div class="ahs ar"><div class="av">${left}</div><div class="al">남은</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;margin-top:10px;">
      <div style="flex:1;height:6px;background:var(--bg);border:1px solid var(--border);border-radius:3px;overflow:hidden;">
        <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--blue),var(--green));border-radius:3px;transition:width .4s;"></div>
      </div>
      <span style="font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--green);flex-shrink:0;">${pct}%</span>
    </div>`;
}

function renderDetail(){
  if(!curApt) return;
  const apt=APTS.find(a=>a.id===curApt);
  if(!apt) return;

  document.getElementById('detail-title').textContent=apt.name;
  document.getElementById('apt-hero').innerHTML=buildHeroHtml(apt);

  // 해당 요일에 보여야 할 차량 (sched 원래 + 이월)
  const visible=apt.cars
    .map((car,ci)=>({car,ci}))
    .filter(({ci})=>shouldShowOnDay(apt,ci,activeDay));

  const el=document.getElementById('car-list');
  if(visible.length===0){
    const dayName=DAYS.find(d=>d.key===activeDay)?.name;
    el.innerHTML=`<div class="empty-msg"><div class="ei">🚗</div>${dayName}요일 예정 차량이 없습니다</div>`;
    return;
  }

  // 정렬: 이월 미완료 → 일반 미완료 → 완료
  const sorted=[...visible].sort((a,b)=>{
    const aDone=isDone(apt.id,a.ci,activeDay);
    const bDone=isDone(apt.id,b.ci,activeDay);
    const aCo=isCarryoverOnDay(apt,a.ci,activeDay);
    const bCo=isCarryoverOnDay(apt,b.ci,activeDay);
    if(aDone&&!bDone) return 1;
    if(!aDone&&bDone) return -1;
    if(aCo&&!bCo) return -1;
    if(!aCo&&bCo) return 1;
    return 0;
  });

  el.innerHTML=sorted.map(({car,ci})=>{
    const done_=isDone(apt.id,ci,activeDay);
    const co_=isCarryoverOnDay(apt,ci,activeDay);
    let cardClass='car-card';
    if(done_) cardClass+=' done-card';
    else if(co_) cardClass+=' carryover-card';
    const coFrom=co_?carryoverFromDay(apt,ci,activeDay):'';

    return `
    <div class="${cardClass}" id="card-${apt.id}-${ci}">
      <div class="cc-top">
        <div class="cc-num">${car.num}</div>
        <div class="cc-info">
          <div class="cc-name">${car.car}</div>
          <div class="cc-loc">${car.loc}</div>
        </div>
        ${co_?`<span class="carryover-tag">↩ ${coFrom}이월</span>`
             :`<span class="color-chip ${colCls(car.col)}">${car.col}</span>`}
      </div>
      ${car.note?`<div class="cc-note">${car.note}</div>`:''}
      <div class="cc-check-row">
        <div class="cc-check-left">
          <div class="cc-check-status ${done_?'s-done':co_?'s-carry':'s-wait'}" id="status-${apt.id}-${ci}">
            ${done_?'✅ 세차 완료':co_?'↩ 이월된 차량':'⏳ 세차 대기'}
          </div>
          <div class="cc-check-hint">${done_?'탭하여 취소':'탭하면 완료 처리'}</div>
        </div>
        <div class="chk-btn${done_?' done':''}" id="chk-${apt.id}-${ci}"
          data-apt="${apt.id}" data-ci="${ci}"
          onclick="toggleCar(this)">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
      </div>
    </div>`;
  }).join('');

  if(apt.memo){
    el.innerHTML+=`<div style="margin-top:8px;border-radius:10px;padding:9px 12px;background:rgba(37,99,235,.04);border:1px solid rgba(37,99,235,.15);font-size:11px;color:var(--muted);line-height:1.6;">📌 ${apt.memo}</div>`;
  }
}

function toggleCar(btn){
  const {apt,ci}=btn.dataset;
  const now=isDone(apt,+ci,activeDay);
  const next=!now;
  setDone(apt,+ci,activeDay,next);

  btn.className=`chk-btn${next?' done':''} pop`;
  setTimeout(()=>btn.classList.remove('pop'),300);

  // 완료 처리 시 이전 미완료 sched 날도 함께 완료 (이월 해소)
  if(next){
    const aptObj=APTS.find(a=>a.id===apt);
    const car=aptObj?.cars[+ci];
    if(car){
      const todayIdx=DAY_ORDER.indexOf(activeDay);
      for(let i=0;i<todayIdx;i++){
        const pd=DAY_ORDER[i];
        if(car.sched.includes(pd)&&!isDone(apt,+ci,pd)){
          setDone(apt,+ci,pd,true);
        }
      }
    }
  }

  // 카드 상태 즉시 업데이트
  const aptObj=APTS.find(a=>a.id===apt);
  const co_=!next&&aptObj?isCarryoverOnDay(aptObj,+ci,activeDay):false;
  const statusEl=document.getElementById(`status-${apt}-${ci}`);
  if(statusEl){
    statusEl.className=`cc-check-status ${next?'s-done':co_?'s-carry':'s-wait'}`;
    statusEl.textContent=next?'✅ 세차 완료':co_?'↩ 이월된 차량':'⏳ 세차 대기';
  }
  const cardEl=document.getElementById(`card-${apt}-${ci}`);
  if(cardEl){
    cardEl.classList.toggle('done-card',next);
    cardEl.classList.toggle('carryover-card',!next&&co_);
  }
  const hintEl=cardEl?.querySelector('.cc-check-hint');
  if(hintEl) hintEl.textContent=next?'탭하여 취소':'탭하면 완료 처리';

  if(aptObj) document.getElementById('apt-hero').innerHTML=buildHeroHtml(aptObj);

  showToast(next?'✅ 완료 처리':'↩ 대기로 변경');
  calcHomeSummary();
  refreshAptBadge(apt);
}

function refreshAptBadge(aptId){
  const apt=APTS.find(a=>a.id===aptId); if(!apt) return;
  const visible=apt.cars.map((_,ci)=>ci).filter(ci=>shouldShowOnDay(apt,ci,activeDay));
  const total=visible.length;
  const done=visible.filter(ci=>isDone(apt.id,ci,activeDay)).length;
  const carryovers=visible.filter(ci=>isCarryoverOnDay(apt,ci,activeDay)).length;
  const pct=total?Math.round(done/total*100):0;
  const btnEl=document.querySelector(`[onclick="goDetail('${aptId}')"]`); if(!btnEl) return;
  const badge=btnEl.querySelector('.ab-badge');
  const bar=btnEl.querySelector('.ab-prog-fill');
  const coEl=btnEl.querySelector('[style*="ea580c"]');
  if(badge){
    const cls=done===total&&total>0?'b-all':'b-some';
    const txt=`${done}/${total}${done===total&&total>0?' ✓':''}`;
    badge.className=`ab-badge ${cls}`; badge.textContent=txt;
  }
  if(bar) bar.style.width=pct+'%';
  if(coEl) coEl.textContent=carryovers>0?`↩ 이월 ${carryovers}대`:'';
}

/* ════════════════════════════════════
   RESET
════════════════════════════════════ */
function doReset(){
  const scope=curApt?APTS.find(a=>a.id===curApt)?.name:'전체';
  const dayName=DAYS.find(d=>d.key===activeDay)?.name;
  if(!confirm(`[${scope}] ${dayName}요일 완료 체크를 모두 초기화할까요?`)) return;
  if(curApt){
    const apt=APTS.find(a=>a.id===curApt);
    apt?.cars.forEach((_,ci)=>setDone(apt.id,ci,activeDay,false));
    renderDetail();
  } else {
    APTS.forEach(apt=>apt.cars.forEach((_,ci)=>setDone(apt.id,ci,activeDay,false)));
    renderHome();
  }
  showToast('초기화 완료');
}

/* ════════════════════════════════════
   MANAGE PAGE
════════════════════════════════════ */
// APTS를 localStorage에 저장/불러오기 (커스텀 차량 관리)
const STORAGE_KEY = 'carwash_apts_v1';

function saveApts(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(APTS.map(a=>({
    id:a.id, name:a.name, icon:a.icon, memo:a.memo,
    cars:a.cars.map(c=>({num:c.num,car:c.car,col:c.col,loc:c.loc,sched:c.sched,note:c.note}))
  }))));
}

function loadApts(){
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if(!saved) return;
    const data = JSON.parse(saved);
    data.forEach(saved=>{
      const apt = APTS.find(a=>a.id===saved.id);
      if(apt) apt.cars = saved.cars;
    });
  } catch(e){}
}

function goManage(){
  showPage('pg-manage');
  initManagePage();
}

function initManagePage(){
  // 아파트 셀렉트 채우기 (등록용)
  const addSel = document.getElementById('add-apt');
  addSel.innerHTML = '<option value="">아파트를 선택하세요</option>'
    + APTS.map(a=>`<option value="${a.id}">${a.name}</option>`).join('');

  // 아파트 셀렉트 채우기 (삭제용)
  const delSel = document.getElementById('del-apt');
  delSel.innerHTML = '<option value="all">전체 아파트</option>'
    + APTS.map(a=>`<option value="${a.id}">${a.name}</option>`).join('');

  switchTab('add');
  renderDeleteList();
}

function switchTab(tab){
  document.getElementById('tab-add').classList.toggle('on', tab==='add');
  document.getElementById('tab-del').classList.toggle('on', tab==='del');
  document.getElementById('panel-add').style.display = tab==='add'?'':'none';
  document.getElementById('panel-del').style.display = tab==='del'?'':'none';
  if(tab==='del') renderDeleteList();
}

// 요일 버튼 토글
document.addEventListener('click', e=>{
  if(e.target.classList.contains('mg-day')){
    e.target.classList.toggle('on');
  }
});

function submitAdd(){
  const aptId = document.getElementById('add-apt').value;
  const num   = document.getElementById('add-num').value.trim();
  const car   = document.getElementById('add-car').value.trim();
  const loc   = document.getElementById('add-loc').value.trim();
  const col   = document.getElementById('add-col').value;
  const note  = document.getElementById('add-note').value.trim();
  const sched = [...document.querySelectorAll('.mg-day.on')].map(b=>b.dataset.day);

  // 유효성
  if(!aptId){ showToast('⚠️ 아파트를 선택하세요'); return; }
  if(!num)  { showToast('⚠️ 차량 번호를 입력하세요'); return; }
  if(!car)  { showToast('⚠️ 차종을 입력하세요'); return; }
  if(!sched.length){ showToast('⚠️ 세차 요일을 선택하세요'); return; }

  const apt = APTS.find(a=>a.id===aptId);
  if(!apt) return;

  // 중복 체크
  if(apt.cars.find(c=>c.num===num)){
    showToast('⚠️ 이미 등록된 차량 번호입니다'); return;
  }

  apt.cars.push({num, car, col, loc: loc||'—', sched, note});
  saveApts();

  // 입력 초기화
  document.getElementById('add-num').value='';
  document.getElementById('add-car').value='';
  document.getElementById('add-loc').value='';
  document.getElementById('add-note').value='';
  document.getElementById('add-col').value='—';
  document.querySelectorAll('.mg-day.on').forEach(b=>b.classList.remove('on'));
  document.getElementById('add-apt').value='';

  showSuccessModal({aptName: apt.name, num, car, loc: loc||'—', col, sched});
  renderHome();
}

function renderDeleteList(){
  const aptFilter = document.getElementById('del-apt')?.value || 'all';
  const query     = (document.getElementById('del-search')?.value || '').toLowerCase().trim();
  const el        = document.getElementById('del-list');
  if(!el) return;

  let items = [];
  APTS.forEach(apt=>{
    if(aptFilter!=='all' && apt.id!==aptFilter) return;
    apt.cars.forEach((car,ci)=>{
      if(query && !car.num.toLowerCase().includes(query) && !car.car.toLowerCase().includes(query)) return;
      items.push({apt, car, ci});
    });
  });

  if(!items.length){
    el.innerHTML=`<div class="del-empty"><div class="dei">🔍</div>차량이 없습니다</div>`;
    return;
  }

  el.innerHTML=items.map(({apt,car,ci})=>`
    <div class="del-card">
      <div class="del-card-body">
        <span class="del-apt-tag">${apt.name}</span>
        <div class="del-car-info">
          <div class="del-car-num">${car.num}</div>
          <div class="del-car-name">${car.car}</div>
          <div class="del-car-sub">${car.loc} · ${car.col}</div>
          <div class="del-sched">
            ${car.sched.map(dk=>`<span class="del-sched-day">${DAYS.find(d=>d.key===dk)?.name}요일</span>`).join('')}
          </div>
        </div>
        <div class="del-btn" onclick="deleteCar('${apt.id}',${ci})">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/>
          </svg>
        </div>
      </div>
    </div>`).join('');
}

// 삭제 대상 임시 저장
let _pendingDelete = null;

function deleteCar(aptId, ci){
  const apt = APTS.find(a=>a.id===aptId);
  if(!apt) return;
  const car = apt.cars[ci];
  if(!car) return;

  // 확인 모달 열기
  _pendingDelete = {aptId, ci};
  document.getElementById('dm-num').textContent = car.num;
  document.getElementById('dm-car').textContent = car.car;
  document.getElementById('dm-apt').textContent = `${apt.name} · ${car.loc}`;
  document.getElementById('delete-modal').classList.add('on');
}

function closeDeleteModal(){
  document.getElementById('delete-modal').classList.remove('on');
  _pendingDelete = null;
}

function confirmDelete(){
  if(!_pendingDelete) return;
  const {aptId, ci} = _pendingDelete;
  const apt = APTS.find(a=>a.id===aptId);
  if(!apt) return;
  const car = apt.cars[ci];
  if(!car) return;

  // 삭제 실행
  DAY_ORDER.forEach(d=>localStorage.removeItem(sk(aptId,ci,d)));
  apt.cars.splice(ci,1);
  saveApts();

  // 확인 모달 닫기
  document.getElementById('delete-modal').classList.remove('on');
  _pendingDelete = null;

  // 완료 모달 열기
  document.getElementById('ddm-apt-name').textContent = apt.name;
  document.getElementById('ddm-num').textContent = car.num;
  document.getElementById('ddm-car').textContent = car.car;
  document.getElementById('ddm-loc').textContent = car.loc;
  document.getElementById('delete-done-modal').classList.add('on');

  renderDeleteList();
  renderHome();
}

function closeDeleteDoneModal(){
  document.getElementById('delete-done-modal').classList.remove('on');
}

/* ════════════════════════════════════
   SUCCESS MODAL
════════════════════════════════════ */
function showSuccessModal({aptName, num, car, loc, col, sched}){
  document.getElementById('sm-apt-name').textContent = aptName;
  document.getElementById('sm-num').textContent = num;
  document.getElementById('sm-car').textContent = car;
  document.getElementById('sm-loc').textContent = loc;
  document.getElementById('sm-col').textContent = col;
  document.getElementById('sm-sched').innerHTML =
    sched.map(dk=>`<span class="sm-sched-day">${DAYS.find(d=>d.key===dk)?.name}요일</span>`).join('');
  document.getElementById('success-modal').classList.add('on');
}
function closeSuccessModal(){
  document.getElementById('success-modal').classList.remove('on');
}


let _tt;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('on');
  clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('on'),1800);
}

loadApts();
updateDate();
renderHome();
